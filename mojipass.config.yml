## Mojipass Configuration

# Number of emoji to enter for authentication
codeLength: 4

# Emoji keypad — each symbol maps to a numeric value internally
# You can replace symbols with custom image paths: symbol: /images/cat.png
keys:
  - symbol: "🦊"
    value: 0
  - symbol: "🌊"
    value: 1
  - symbol: "🍕"
    value: 2
  - symbol: "🌈"
    value: 3
  - symbol: "🔥"
    value: 4
  - symbol: "🎯"
    value: 5
  - symbol: "🌙"
    value: 6
  - symbol: "⚡"
    value: 7
  - symbol: "🎸"
    value: 8

# Set to true to require a username in addition to the emoji code
username: false

# Session configuration
session:
  # Change this to a long random string — keep it secret
  secret: "change-me-to-a-long-random-secret"
  # Cookie name set in the browser
  cookieName: "mojipass_session"
  # Session lifetime in seconds (86400 = 24 hours)
  expiresInSeconds: 86400

# Path to the hashed credentials file (generated by: npm run setup)
# Can be an absolute path outside the project folder for extra security
credentials:
  path: "./credentials.hash.yml"

# Optional: color scheme overrides
# colors:
#   background: "222 47% 9%"
#   foreground: "213 31% 91%"
#   primary: "217 91% 60%"
#   accent: "262 80% 65%"

# Standalone mode: proxy all authenticated traffic to your app
# proxy:
#   target: "http://localhost:3000"

# Optional: protect only specific paths (htaccess-style partial protection)
# When set, only these path prefixes require authentication — all other routes are public.
# When omitted, all routes require authentication (full gateway mode).
# protectedPaths:
#   - "/admin"
#   - "/dashboard"
#   - "/intern"
